services:
  db:
    image: mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hornetsecurity
      MYSQL_USER: user
      MYSQL_PASSWORD: hornetsecurity
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - 3306:3306
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "user", "-phornetsecurity"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Hornet-BE/Hornet.Api/Dockerfile
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Hornet-BE/Hornet.Worker/Dockerfile
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy

volumes:
  mysql-data: