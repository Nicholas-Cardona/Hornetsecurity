<app-card-skeleton>
  <h1 card-title>Sign Up</h1>
  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
    <app-text-input type="email" placeholder="Email" formControlName="email" class="w-full" />

    <app-text-input type="password" placeholder="Password" formControlName="password" class="w-full" />

    <app-form-button [disabled]="form.invalid">Sign Up</app-form-button>
  </form>
</app-card-skeleton>
