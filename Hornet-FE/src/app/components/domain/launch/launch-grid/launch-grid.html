<section class="shell">
  <!-- Header -->
  <header class="header">
    <h2 class="grid-title">{{ title }}</h2>
    <span class="page-badge">Page {{ page }} of {{ totalPages }}</span>
  </header>

  <!-- Grid -->
<div class="flex h-full overflow-hidden">
  @if (launches.length) {
    
    <div class="launch-grid">
      @for (launch of launches; track launch.id) {
        <app-launch [launch]="launch" />
      }
    </div>
  } @else {
    <p class="empty-state">No launches found.</p>
  }
</div>
  <!-- Pagination -->
  @if (totalPages > 1) {
    <nav class="pagination" aria-label="Pagination">
      <button
        class="pg-btn"
        (click)="prev()"
        [disabled]="page === 1"
      >
        <svg viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        Prev
      </button>

      <span class="pg-indicator">
        <span class="current">{{ page }}</span>
        <span class="pg-divider">/</span>
        {{ totalPages }}
      </span>

      <button
        class="pg-btn"
        (click)="next()"
        [disabled]="page === totalPages"
      >
        Next
        <svg viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </button>
    </nav>
  }
</section>
