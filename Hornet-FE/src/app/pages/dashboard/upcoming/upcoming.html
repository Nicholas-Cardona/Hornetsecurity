@if (upcomingLaunches.data() && upcomingLaunchesCount.data(); ) {
  <app-launch-grid
    title="Upcoming Launches"
    [launches]="upcomingLaunches.data()!"
    [count]="upcomingLaunchesCount.data()!"
    [page]="upcomingLauncesPage()"
    [size]="pagingSize"
    (pageChange)="handleChangeUpcomingPage($event)"
  />
} @else {
  <p class="py-10 text-center text-gray-500">
    Loading upcoming launches…
  </p>
}
