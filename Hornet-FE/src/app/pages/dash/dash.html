@if (upcomingLaunches.data() && upcomingLaunchesCount.data(); ) {
  <app-launch-grid
    title="Upcoming Launches"
    [launches]="upcomingLaunches.data()!"
    [count]="upcomingLaunchesCount.data()!"
    [page]="upcomingLauncesPage()"
    [size]="pagingSize"
    (pageChange)="handleChangeUpcomingPage($event)"
  />
} @else {
  <p class="py-10 text-center text-gray-500">
    Loading upcoming launches…
  </p>
}

@if (latestLaunches.data() && latestLaunchesCount.data(); ) {
  <app-launch-grid
    title="Latest Launches"
    [launches]="latestLaunches.data()!"
    [count]="latestLaunchesCount.data()!"
    [page]="latestLaunchesPage()"
    [size]="pagingSize"
    (pageChange)="handleChangeLatestPage($event)"
  />
} @else {
  <p class="py-10 text-center text-gray-500">
    Loading latest launches…
  </p>
}
